<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; background: #0a0f1e; color: #e0e0e0; }
    header { padding: 1.5rem; background: linear-gradient(135deg, #1a1f35 0%, #0e1322 100%); border-bottom: 1px solid #2a3a5c; }
    nav a { color: #a0c4ff; margin-right: 1.5rem; text-decoration: none; }
    main { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    .card { background: #151e2f; border-radius: 16px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2e3f5a; }
    .btn { display: inline-block; background: #3b82f6; color: white; padding: 0.8rem 1.8rem; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 1rem; }
    footer { text-align: center; padding: 2rem; color: #7f8ea3; border-top: 1px solid #1e2a3a; margin-top: 3rem; }
  </style>
</head>
<body>
  <header>
    <h1 style="margin:0; color:white;">Global Study</h1>
    <nav style="margin-top:1rem;">
      <a href="/">Accueil</a>
      <a href="/pays/russie">Russie</a>
      <a href="/pays/allemagne">Allemagne</a>
      <a href="/bourses">Bourses</a>
      <a href="/langues/apprendre-russe">Russe</a>
      <a href="/langues/apprendre-allemand">Allemand</a>
      <a href="/paiement" style="background:#3b82f6; padding:0.5rem 1rem; border-radius:20px;">Premium</a>
      <a href="/admin" style="float:right;">Admin</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>&copy; 2026 Global Study &ndash; Tous droits reserves.<br>
    <a href="https://wa.me/33753883652" style="color:#25D366;">WhatsApp</a> | contacts.globalstudy@gmail.com</p>
  </footer>
</body>
</html>
